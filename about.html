<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAstarworks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css?v=50">

  <!-- Meta -->
  <meta name="description" content="LAstarworks — The art of having fun is heading to space.">
  <meta name="theme-color" content="#000000">

  <!-- Icons -->
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon.png">
</head>

<body>

  <!-- BACKGROUND -->
  <div class="background-layer"></div>
  <div class="video-wrapper">
    <video autoplay muted loop playsinline>
      <source src="test.mp4" type="video/mp4">
    </video>
  </div>

  <!-- SOCIAL ICONS -->
  <div class="social-row">
    <a href="https://www.facebook.com/lastarworks" target="_blank" class="social-item">
      <img src="fb.svg"><span>Facebook</span>
    </a>

    <a href="https://www.instagram.com/lastarworks.space/" target="_blank" class="social-item">
      <img src="ig.svg"><span>Instagram</span>
    </a>

    <a href="https://app.astrobin.com/u/LAstarworks.space#gallery" target="_blank" class="social-item">
      <img src="astrobin.svg"><span>AstroBin</span>
    </a>

    <a href="https://www.youtube.com/@LAstarworks" target="_blank" class="social-item">
      <img src="youtube.svg"><span>YouTube</span>
    </a>
  </div>

  <!-- LAUNCH BUTTON -->
  <a href="about.html" class="enter-space-btn">LAUNCH</a>

  <!-- COUNTDOWN -->
  <div id="countdown" class="countdown-bottom"></div>

  <!-- FOOTER -->
  <footer>© LAstarworks.space — All rights reserved</footer>

  <!-- SCRIPT -->
  <script>
    /* COUNTDOWN */
    const countdownElement = document.getElementById("countdown");
    const targetDate = new Date("2026-06-30T00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        countdownElement.innerHTML = "00:00:00:00";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      countdownElement.innerHTML =
        `${String(days).padStart(2, '0')}:` +
        `${String(hours).padStart(2, '0')}:` +
        `${String(minutes).padStart(2, '0')}:` +
        `${String(seconds).padStart(2, '0')}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* WAVE PULSE */
    const icons = document.querySelectorAll('.social-item');

    function waveCycle(direction = 'forward') {
      const sequence = direction === 'forward' ? [...icons] : [...icons].reverse();

      sequence.forEach((icon, i) => {
        setTimeout(() => {
          icon.classList.add('active-pulse');
          setTimeout(() => icon.classList.remove('active-pulse'), 500);
        }, i * 200);
      });

      const totalDuration = sequence.length * 200 + 500;
      const nextDirection = direction === 'forward' ? 'backward' : 'forward';

      setTimeout(() => {
        if (nextDirection === 'forward') {
          setTimeout(() => waveCycle(nextDirection), 5000);
        } else {
          waveCycle(nextDirection);
        }
      }, totalDuration);
    }

    waveCycle('forward');
  </script>

</body>
</html>
