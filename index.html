  <script>
    /* Countdown */
    (function(){
      const el = document.getElementById('countdown');
      const target = new Date('2026-06-30T00:00:00').getTime();
      function tick(){
        const now = Date.now();
        const d = Math.max(0, target - now);
        const days = Math.floor(d / 86400000);
        const hours = Math.floor((d / 3600000) % 24);
        const mins = Math.floor((d / 60000) % 60);
        const secs = Math.floor((d / 1000) % 60);
        el.textContent = `${String(days).padStart(2,'0')}:${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      }
      tick();
      setInterval(tick,1000);
    })();

    /* Audio unlock */
    (function(){
      const audio = document.getElementById('bg-audio');
      function unlock(){ if(audio.paused) audio.play().catch(()=>{}); }
      document.addEventListener('click', unlock, { once:true });
      document.addEventListener('touchstart', unlock, { once:true });
    })();

    /* Lazy-load video */
    (function(){
      const video = document.getElementById('bgVideo');
      const src = "https://ia600802.us.archive.org/16/items/test-1-1_202605/test%20(1)%20(1).mp4";
      window.addEventListener('load', () => {
        requestAnimationFrame(() => {
          video.src = src;
          video.play().catch(()=>{});
        });
      });
    })();

    /* Menu */
    (function(){
      const menu = document.getElementById('menu');
      const openBtn = document.getElementById('openMenu');
      const closeBtn = document.getElementById('closeMenu');
      const focusableSelector = 'a[href], button:not([disabled])';
      let lastFocused = null;

      function openMenu(){
        lastFocused = document.activeElement;
        menu.classList.add('active');
        menu.setAttribute('aria-hidden','false');
        openBtn.setAttribute('aria-expanded','true');
        const first = menu.querySelector('.menu-item');
        if(first) first.focus();
        document.addEventListener('focus', trapFocus, true);
        document.addEventListener('keydown', onKeyDown);
      }

      function closeMenu(){
        menu.classList.remove('active');
        menu.setAttribute('aria-hidden','true');
        openBtn.setAttribute('aria-expanded','false');
        if(lastFocused) lastFocused.focus();
        document.removeEventListener('focus', trapFocus, true);
        document.removeEventListener('keydown', onKeyDown);
      }

      function trapFocus(e){
        if(!menu.contains(e.target)){
          e.stopPropagation();
          const focusables = [...menu.querySelectorAll(focusableSelector)];
          if(focusables.length) focusables[0].focus();
        }
      }

      function onKeyDown(e){
        if(e.key === 'Escape') closeMenu();
        if(e.key === 'Tab'){
          const focusables = [...menu.querySelectorAll(focusableSelector)];
          if(!focusables.length) return;
          const idx = focusables.indexOf(document.activeElement);
          if(e.shiftKey && idx === 0){ e.preventDefault(); focusables[focusables.length-1].focus(); }
          else if(!e.shiftKey && idx === focusables.length-1){ e.preventDefault(); focusables[0].focus(); }
        }
      }

      openBtn.addEventListener('click', openMenu);
      closeBtn.addEventListener('click', closeMenu);

      function adjustMenuForViewport(){
        if(window.innerWidth <= 520 || (window.innerWidth < window.innerHeight && window.innerWidth <= 720)){
          menu.classList.add('mobile-layout');
          menu.classList.remove('desktop-layout');
        } else {
          menu.classList.add('desktop-layout');
          menu.classList.remove('mobile-layout');
        }
      }
      window.addEventListener('resize', adjustMenuForViewport);
      window.addEventListener('orientationchange', adjustMenuForViewport);
      adjustMenuForViewport();
    })();

    /* Social icons wave */
    (function(){
      const icons = document.querySelectorAll('.social-item');
      function wave(direction='forward'){
        const seq = direction === 'forward' ? [...icons] : [...icons].reverse();
        seq.forEach((icon,i)=>{
          setTimeout(()=>{ 
            icon.classList.add('active-pulse'); 
            setTimeout(()=>icon.classList.remove('active-pulse'),500); 
          }, i*200);
        });
        const total = seq.length*200 + 500;
        setTimeout(()=> wave(direction==='forward'?'backward':'forward'), total + 3000);
      }
      if(icons.length) wave('forward');
    })();
  </script>
