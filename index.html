<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAstarworks.space</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=5">
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <div class="background-layer"></div>
  <div class="video-wrapper">
    <video autoplay muted loop playsinline>
      <source src="test.mp4" type="video/mp4">
    </video>
  </div>

  <!-- SOCIAL ICONS -->
  <div class="social-row">
    <a class="social-item" href="https://www.facebook.com/lastarworks.space" target="_blank">
      <img src="fb.svg" alt="Facebook">
      <span>Facebook</span>
    </a>

    <a class="social-item" href="https://www.instagram.com/lastarworks.space/" target="_blank">
      <img src="ig.svg" alt="Instagram">
      <span>Instagram</span>
    </a>

    <a class="social-item" href="https://app.astrobin.com/u/LAstarworks.space#gallery" target="_blank">
      <img src="astrobin.svg" alt="AstroBin">
      <span>AstroBin</span>
    </a>

    <a class="social-item" href="https://www.youtube.com/@LAstarworks" target="_blank">
      <img src="youtube.svg" alt="YouTube">
      <span>YouTube</span>
    </a>
  </div>

  <!-- ENTER SPACE BUTTON -->
  <div class="enter-space-btn" id="openMenu">
    <img src="ENTERSPACE.svg" alt="Enter Space">
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown-bottom" id="countdown">107:14:29:00</div>

  <!-- FULLSCREEN MENU -->
  <div class="fullscreen-menu" id="menu">
    <div class="menu-close" id="closeMenu">CLOSE</div>

    <a href="about.html" class="menu-item">ABOUT THE PROJECT</a>
    <a href="observatory.html" class="menu-item">OBSERVATORY</a>
    <a href="gallery.html" class="menu-item">GALLERY</a>
    <a href="contact.html" class="menu-item">CONTACT</a>
  </div>

  <!-- FOOTER -->
  <footer>
    © LAstarworks.space – All rights reserved
  </footer>

  <!-- MENU SCRIPT -->
  <script>
    const menu = document.getElementById("menu");
    const openMenu = document.getElementById("openMenu");
    const closeMenu = document.getElementById("closeMenu");

    openMenu.onclick = () => {
      menu.classList.add("active");
    };

    closeMenu.onclick = () => {
      menu.classList.remove("active");
    };
  </script>

</body>
</html>
