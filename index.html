  <!-- Scripts (UNCHANGED behavior; menu open/close only affects fullscreen menu) -->
  <script>
    /* Countdown (RESTORED CENTERED) */
    const countdownElement = document.getElementById("countdown");
    const targetDate = new Date("2026-06-30T00:00:00").getTime();

    function updateCountdown() {
      const now = Date.now();
      const distance = targetDate - now;

      if (distance <= 0) {
        countdownElement.textContent = "00:00:00:00";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      countdownElement.textContent =
        `${String(days).padStart(2,'0')}:` +
        `${String(hours).padStart(2,'0')}:` +
        `${String(minutes).padStart(2,'0')}:` +
        `${String(seconds).padStart(2,'0')}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    /* Audio unlock for mobile (UNCHANGED) */
    const audio = document.getElementById("bg-audio");
    function playAudio() {
      if (audio && audio.paused) audio.play().catch(()=>{});
    }
    document.addEventListener("click", playAudio, { once: true });
    document.addEventListener("touchstart", playAudio, { once: true });

    /* Menu open/close (only toggles fullscreen menu) */
    const menu = document.getElementById("menu");
    const openMenu = document.getElementById("openMenu");
    const closeMenu = document.getElementById("closeMenu");

    openMenu.addEventListener("click", () => {
      menu.classList.add("active");
      menu.setAttribute('aria-hidden','false');
    });
    closeMenu.addEventListener("click", () => {
      menu.classList.remove("active");
      menu.setAttribute('aria-hidden','true');
    });

    /* Wave pulse for social icons (UNCHANGED) */
    const icons = document.querySelectorAll('.social-item');
    function waveCycle(direction = 'forward') {
      const seq = direction === 'forward' ? [...icons] : [...icons].reverse();
      seq.forEach((icon, i) => {
        setTimeout(() => {
          icon.classList.add('active-pulse');
          setTimeout(() => icon.classList.remove('active-pulse'), 500);
        }, i * 200);
      });
      const total = seq.length * 200 + 500;
      const next = direction === 'forward' ? 'backward' : 'forward';
      setTimeout(() => {
        if (next === 'forward') setTimeout(() => waveCycle(next), 5000);
        else waveCycle(next);
      }, total);
    }
    waveCycle('forward');
  </script>
